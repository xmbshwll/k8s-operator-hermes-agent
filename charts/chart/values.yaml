## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Controller image settings
##
image:
  repository: controller
  tag: latest
  pullPolicy: IfNotPresent

## Number of controller-manager replicas.
## Keep leaderElection enabled when replicaCount > 1.
##
replicaCount: 1

## Optional image pull secrets for the controller-manager pod.
##
imagePullSecrets: []

## Leader election should stay enabled for clustered installs.
##
leaderElection:
  enabled: true

## Service account used by the controller manager.
##
serviceAccount:
  create: true
  name: ""

## Extra annotations applied to the controller-manager pod.
##
podAnnotations: {}

## Extra labels applied to the controller-manager pod.
##
podLabels: {}

## Security context for the controller-manager pod.
##
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

## Security context for the controller-manager container.
##
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

## Scheduling constraints for the controller-manager pod.
##
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

## Resource requests and limits for the controller manager.
##
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enabled: true
  service:
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    namespace: ""
    additionalLabels: {}
    interval: ""
    scrapeTimeout: ""
    tlsConfig:
      insecureSkipVerify: false
      serverName: ""
  networkPolicy:
    enabled: false
    namespaceSelector:
      matchLabels:
        metrics: enabled

## Admission webhook configuration.
## Production installs should leave both webhook and certManager enabled.
##
webhook:
  enabled: true
  port: 9443
  networkPolicy:
    enabled: false

## cert-manager integration for webhook TLS certificates.
## Requires cert-manager CRDs and controller to be installed in the cluster.
##
certManager:
  enabled: true
