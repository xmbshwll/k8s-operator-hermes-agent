{{- if and .Values.metrics.enabled .Values.metrics.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
{{ include "k8s-operator-hermes-agent.controllerManagerLabels" . | nindent 4 }}
  name: {{ include "k8s-operator-hermes-agent.resourceName" (dict "suffix" "allow-metrics-traffic" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
{{ include "k8s-operator-hermes-agent.controllerManagerSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.metrics.networkPolicy.namespaceSelector | nindent 12 }}
      ports:
        - port: 8443
          protocol: TCP
{{- end }}
