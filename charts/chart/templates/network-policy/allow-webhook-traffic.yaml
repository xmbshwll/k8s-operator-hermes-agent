{{- if and .Values.webhook.enabled .Values.certManager.enabled .Values.webhook.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "k8s-operator-hermes-agent.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "k8s-operator-hermes-agent.resourceName" (dict "suffix" "allow-webhook-traffic" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-operator-hermes-agent.name" . }}
      control-plane: controller-manager
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.webhook.port }}
          protocol: TCP
{{- end }}
