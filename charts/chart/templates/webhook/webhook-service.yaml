{{- if and .Values.webhook.enabled .Values.certManager.enabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
{{ include "k8s-operator-hermes-agent.controllerManagerLabels" . | nindent 4 }}
  name: {{ include "k8s-operator-hermes-agent.resourceName" (dict "suffix" "webhook-service" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: {{ .Values.webhook.port }}
  selector:
{{ include "k8s-operator-hermes-agent.controllerManagerSelectorLabels" . | nindent 4 }}
{{- end }}
