{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/ServiceMonitor") }}
{{- $metricsTLSManaged := include "k8s-operator-hermes-agent.metricsTLSManaged" . }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
{{ include "k8s-operator-hermes-agent.controllerManagerLabels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  name: {{ include "k8s-operator-hermes-agent.resourceName" (dict "suffix" "metrics-monitor" "context" $) }}
  namespace: {{ default .Release.Namespace .Values.metrics.serviceMonitor.namespace }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        {{- if $metricsTLSManaged }}
        insecureSkipVerify: false
        serverName: {{ default (include "k8s-operator-hermes-agent.metricsServiceServerName" .) .Values.metrics.serviceMonitor.tlsConfig.serverName | quote }}
        ca:
          secret:
            name: {{ include "k8s-operator-hermes-agent.metricsServingCertificateSecretName" . }}
            key: ca.crt
        cert:
          secret:
            name: {{ include "k8s-operator-hermes-agent.metricsServingCertificateSecretName" . }}
            key: tls.crt
        keySecret:
          name: {{ include "k8s-operator-hermes-agent.metricsServingCertificateSecretName" . }}
          key: tls.key
        {{- else }}
        insecureSkipVerify: {{ .Values.metrics.serviceMonitor.tlsConfig.insecureSkipVerify }}
        {{- if .Values.metrics.serviceMonitor.tlsConfig.serverName }}
        serverName: {{ .Values.metrics.serviceMonitor.tlsConfig.serverName | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.metrics.serviceMonitor.interval }}
      interval: {{ .Values.metrics.serviceMonitor.interval | quote }}
      {{- end }}
      {{- if .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | quote }}
      {{- end }}
  selector:
    matchLabels:
{{ include "k8s-operator-hermes-agent.controllerManagerSelectorLabels" . | nindent 6 }}
{{- end }}
