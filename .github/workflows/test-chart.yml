name: Test Chart

on:
  push:
  pull_request:

jobs:
  test-chart:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster

      - name: Derive chart upgrade metadata
        id: vars
        run: |
          repository_path="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          owner_path="$(dirname "${repository_path}")"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"

          echo "chart_ref=oci://ghcr.io/${owner_path}/charts/k8s-operator-hermes-agent" >> "${GITHUB_OUTPUT}"
          echo "image_repo=ghcr.io/${repository_path}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"
          echo "previous_version=${previous_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Prepare k8s-operator-hermes-agent images
        run: |
          go mod tidy
          make docker-build IMG=controller:latest
          docker build -t example.com/hermes-agent-e2e:v0.0.1 ./test/e2e/testdata/hermes-runtime
          kind load docker-image controller:latest
          kind load docker-image example.com/hermes-agent-e2e:v0.0.1

      - name: Install Helm
        run: make install-helm

      - name: Install cert-manager via Helm
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait \
            --timeout 300s

      - name: Lint Helm chart
        run: helm lint ./charts/chart

      - name: Validate observability and network hardening render path
        run: |
          rendered_chart=/tmp/chart-render.yaml

          helm template k8s-operator-hermes-agent ./charts/chart \
            --set metrics.serviceMonitor.enabled=true \
            --set metrics.networkPolicy.enabled=true \
            --set webhook.networkPolicy.enabled=true \
            --api-versions monitoring.coreos.com/v1/ServiceMonitor > "${rendered_chart}"

          for expected_line in \
            "kind: ServiceMonitor" \
            "name: k8s-operator-hermes-agent-metrics-monitor" \
            "name: k8s-operator-hermes-agent-allow-metrics-traffic" \
            "name: k8s-operator-hermes-agent-allow-webhook-traffic"; do
            grep -F "${expected_line}" "${rendered_chart}"
          done

      - name: Validate observability resources stay disabled by default
        run: |
          rendered_chart=/tmp/chart-render-defaults.yaml

          helm template k8s-operator-hermes-agent ./charts/chart > "${rendered_chart}"

          for forbidden_line in \
            "kind: ServiceMonitor" \
            "allow-metrics-traffic" \
            "allow-webhook-traffic"; do
            if grep -Fq "${forbidden_line}" "${rendered_chart}"; then
              echo "${forbidden_line} should not render by default" >&2
              exit 1
            fi
          done

      - name: Deploy manager via Helm
        run: make helm-deploy IMG=controller:latest

      - name: Check Helm release status
        run: make helm-status

      - name: Validate explicit CRD-first Helm upgrade flow
        run: |
          make build-crd-bundle
          kubectl apply -f dist/hermesagents.hermes.nous.ai-crd.yaml
          helm upgrade k8s-operator-hermes-agent ./charts/chart \
            --namespace k8s-operator-hermes-agent-system \
            --wait \
            --timeout 300s

      - name: Validate real HermesAgent flow through Helm install
        run: |
          kubectl create namespace hermes-chart-e2e
          kubectl label --overwrite namespace hermes-chart-e2e pod-security.kubernetes.io/enforce=restricted

          sed \
            -e 's#repository: ghcr.io/example/hermes-agent#repository: example.com/hermes-agent-e2e#' \
            -e 's#tag: gateway-core#tag: v0.0.1#' \
            config/samples/hermes_v1alpha1_hermesagent.yaml > /tmp/hermesagent-chart-e2e.yaml

          kubectl apply -n hermes-chart-e2e -f /tmp/hermesagent-chart-e2e.yaml
          kubectl wait -n hermes-chart-e2e --for=jsonpath='{.status.phase}'=Ready hermesagent/hermesagent-sample --timeout=5m
          kubectl rollout status -n hermes-chart-e2e statefulset/hermesagent-sample --timeout=5m

      - name: Validate upgrade from previous published chart when available
        if: steps.vars.outputs.previous_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install previous published chart and upgrade to local chart
        if: steps.vars.outputs.previous_tag != ''
        run: |
          set +e
          docker pull ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.previous_tag }}
          pull_status=$?
          set -e

          if [ "$pull_status" -ne 0 ]; then
            echo "Skipping previous-release upgrade validation because the previous image could not be pulled"
            exit 0
          fi

          kind load docker-image ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.previous_tag }}

          set +e
          helm upgrade --install k8s-operator-hermes-agent-upgrade ${{ steps.vars.outputs.chart_ref }} \
            --version ${{ steps.vars.outputs.previous_version }} \
            --namespace k8s-operator-hermes-agent-upgrade-system \
            --create-namespace \
            --wait \
            --timeout 300s
          install_status=$?
          set -e

          if [ "$install_status" -ne 0 ]; then
            echo "Skipping previous-release upgrade validation because the previous chart could not be installed"
            exit 0
          fi

          make build-crd-bundle
          kubectl apply -f dist/hermesagents.hermes.nous.ai-crd.yaml
          helm upgrade k8s-operator-hermes-agent-upgrade ./charts/chart \
            --namespace k8s-operator-hermes-agent-upgrade-system \
            --set image.repository=controller \
            --set image.tag=latest \
            --wait \
            --timeout 300s

      - name: Validate webhook rejection path
        run: |
          cat <<'EOF' >/tmp/hermesagent-invalid.yaml
          apiVersion: hermes.nous.ai/v1alpha1
          kind: HermesAgent
          metadata:
            name: hermesagent-invalid
            namespace: hermes-chart-e2e
          spec:
            image:
              repository: example.com/hermes-agent-e2e
            config:
              raw: |
                model: anthropic/claude-opus-4.1
              configMapRef:
                name: shared-config
                key: config.yaml
          EOF

          set +e
          output=$(kubectl apply -f /tmp/hermesagent-invalid.yaml 2>&1)
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "expected invalid HermesAgent admission to fail" >&2
            exit 1
          fi

          printf '%s\n' "$output"
          printf '%s' "$output" | grep -F "raw and configMapRef are mutually exclusive"

          kubectl delete namespace hermes-chart-e2e --wait=true --timeout=2m
