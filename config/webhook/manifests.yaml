---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-hermes-nous-ai-v1-hermesagent
  failurePolicy: Fail
  name: mhermesagent-v1.kb.io
  rules:
  - apiGroups:
    - hermes.nous.ai
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesagents
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-hermes-nous-ai-v1-hermesagent
  failurePolicy: Fail
  name: vhermesagent-v1.kb.io
  rules:
  - apiGroups:
    - hermes.nous.ai
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesagents
  sideEffects: None
