apiVersion: v1
kind: Secret
metadata:
  name: hermesagent-secret-config
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
stringData:
  config.yaml: |
    model: anthropic/claude-opus-4.1
    terminal:
      backend: local
  gateway.json: |
    {
      "platforms": {}
    }
type: Opaque
---
apiVersion: hermes.nous.ai/v1
kind: HermesAgent
metadata:
  name: hermesagent-secret-config
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
spec:
  image:
    repository: ghcr.io/xmbshwll/hermes-agent-docker
    tag: v2026.3.30
    pullPolicy: IfNotPresent
  mode: gateway
  config:
    secretRef:
      name: hermesagent-secret-config
      key: config.yaml
  gatewayConfig:
    secretRef:
      name: hermesagent-secret-config
      key: gateway.json
  storage:
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  terminal:
    backend: local
  automountServiceAccountToken: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  probes:
    startup:
      enabled: true
      periodSeconds: 10
    readiness:
      enabled: true
      periodSeconds: 10
    liveness:
      enabled: true
      periodSeconds: 10
  service:
    enabled: false
  networkPolicy:
    enabled: false
