apiVersion: v1
kind: Secret
metadata:
  name: hermesagent-plugins
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
stringData:
  plugin.py: |
    def register():
      return "replace-me"
type: Opaque
---
apiVersion: hermes.nous.ai/v1alpha1
kind: HermesAgent
metadata:
  name: hermesagent-plugins
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
spec:
  image:
    repository: ghcr.io/example/hermes-agent
    tag: gateway-core
    pullPolicy: IfNotPresent
  mode: gateway
  config:
    raw: |
      model: openrouter/anthropic/claude-opus-4.1
      terminal:
        backend: local
  gatewayConfig:
    raw: |
      {
        "platforms": {}
      }
  fileMounts:
    - mountPath: /var/run/hermes/plugins
      secretRef:
        name: hermesagent-plugins
  storage:
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  terminal:
    backend: local
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  probes:
    startup:
      enabled: true
      periodSeconds: 10
    readiness:
      enabled: true
      periodSeconds: 10
    liveness:
      enabled: true
      periodSeconds: 10
  service:
    enabled: false
  networkPolicy:
    enabled: false
