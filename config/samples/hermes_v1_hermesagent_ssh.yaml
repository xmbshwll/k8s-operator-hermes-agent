apiVersion: v1
kind: Secret
metadata:
  name: hermesagent-ssh-env
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
stringData:
  OPENROUTER_API_KEY: sk-or-replace-me
  TERMINAL_SSH_HOST: buildbox.example.com
  TERMINAL_SSH_USER: ubuntu
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: hermesagent-ssh-auth
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
stringData:
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    replace-me
    -----END OPENSSH PRIVATE KEY-----
  known_hosts: |
    buildbox.example.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAreplace-me
type: Opaque
---
apiVersion: hermes.nous.ai/v1
kind: HermesAgent
metadata:
  name: hermesagent-ssh
  labels:
    app.kubernetes.io/name: k8s-operator-hermes-agent
    app.kubernetes.io/managed-by: kubectl
spec:
  image:
    repository: ghcr.io/xmbshwll/hermes-agent-docker
    tag: v2026.3.30
    pullPolicy: IfNotPresent
  mode: gateway
  config:
    raw: |
      model: openrouter/anthropic/claude-opus-4.1
      terminal:
        backend: ssh
  gatewayConfig:
    raw: |
      {
        "platforms": {}
      }
  envFrom:
    - secretRef:
        name: hermesagent-ssh-env
  fileMounts:
    - mountPath: /var/run/hermes/ssh
      secretRef:
        name: hermesagent-ssh-auth
      defaultMode: 0444
      items:
        - key: id_ed25519
          path: id_ed25519
          mode: 0600
        - key: known_hosts
          path: known_hosts
  storage:
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  terminal:
    backend: ssh
  automountServiceAccountToken: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  probes:
    startup:
      enabled: true
      periodSeconds: 10
    readiness:
      enabled: true
      periodSeconds: 10
    liveness:
      enabled: true
      periodSeconds: 10
  service:
    enabled: false
  networkPolicy:
    enabled: true
